<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fast Delivery</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>



<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}



body{

font-family:'Cairo',sans-serif;

background:#f5f5f5;

padding-bottom:75px;

direction:rtl;

}




.topbar{

background:#e53935;

color:#fff;

padding:15px;

text-align:center;

font-size:22px;

font-weight:700;

box-shadow:0 2px 8px rgba(0,0,0,.15);

}





.page{

display:none;

animation:fade .3s;

}



.page.active{

display:block;

}




@keyframes fade{

from{

opacity:0;

}

to{

opacity:1;

}

}





.slider{

height:200px;

margin:10px;

border-radius:15px;

overflow:hidden;

position:relative;

background:#fff;

box-shadow:0 3px 10px rgba(0,0,0,.15);

}




.slider img{

position:absolute;

width:100%;

height:100%;

object-fit:cover;

right:-100%;

transition:.6s;

}



.slider img.active{

right:0;

}





.grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:12px;

padding:12px;

}





.card{

background:#fff;

border-radius:15px;

padding:12px;

text-align:center;

cursor:pointer;

box-shadow:0 2px 8px rgba(0,0,0,.12);

transition:.25s;

}



.card:hover{

transform:translateY(-3px);

}





.card img{

width:70px;

height:70px;

border-radius:50%;

object-fit:cover;

margin-bottom:8px;

}



.card div{

font-size:15px;

font-weight:700;

color:#333;

}





.searchBox{

width:95%;

margin:12px auto;

display:block;

padding:13px;

border-radius:12px;

border:2px solid #e53935;

font-family:'Cairo',sans-serif;

font-size:15px;

outline:none;

}




.storeCard{

background:#fff;

margin:12px;

border-radius:16px;

overflow:hidden;

box-shadow:0 3px 10px rgba(0,0,0,.12);

cursor:pointer;

transition:.25s;

}



.storeCard:hover{

transform:translateY(-3px);

}




.storeCard img{

width:100%;

height:170px;

object-fit:cover;

}




.storeName{

padding:14px;

text-align:center;

font-size:18px;

font-weight:700;

  }
  /* تكملة CSS */

.storeHeader{

position:relative;

padding:10px;

background:#fff;

}



.storeHeader img{

width:100%;

height:160px;

object-fit:cover;

border-radius:18px;

box-shadow:0 3px 12px rgba(0,0,0,.15);

}





.backBtn{

position:absolute;

top:22px;

right:22px;

width:45px;

height:45px;

background:#fff;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

font-weight:bold;

color:#e53935;

box-shadow:0 3px 12px rgba(0,0,0,.25);

z-index:5;

cursor:pointer;

}





.sectionScroll{

display:flex;

gap:12px;

padding:12px;

background:#fff;

overflow-x:auto;

}



.sectionScroll::-webkit-scrollbar{

display:none;

}




.sectionCard{

min-width:70px;

padding:8px;

text-align:center;

background:#fff;

border-radius:15px;

box-shadow:0 2px 8px rgba(0,0,0,.1);

cursor:pointer;

}



.sectionCard img{

width:50px;

height:50px;

border-radius:50%;

border:2px solid #e53935;

object-fit:cover;

}





.product{

background:transparent;

padding:5px;

text-align:center;

transition:.25s;

}



.product:hover{

transform:translateY(-4px);

}



.product img{

width:100%;

height:150px;

object-fit:cover;

border-radius:12px;

box-shadow:0 3px 10px rgba(0,0,0,.12);

}



.product h3{

font-size:15px;

margin-top:6px;

font-weight:700;

color:#333;

}



.product p{

color:#e53935;

font-size:18px;

font-weight:800;

margin-top:8px;

}




.cartItem{

background:#fff;

margin:10px;

padding:15px;

border-radius:15px;

box-shadow:0 2px 8px rgba(0,0,0,.12);

}




.sendBtn{

position:fixed;

bottom:75px;

right:10px;

left:10px;

height:52px;

background:#25D366;

color:#fff;

border:0;

border-radius:12px;

font-family:'Cairo',sans-serif;

font-size:17px;

font-weight:700;

}




.bottomNav{

position:fixed;

bottom:0;

width:100%;

height:68px;

background:#fff;

display:flex;

justify-content:space-around;

align-items:center;

box-shadow:0 -2px 10px rgba(0,0,0,.15);

z-index:999;

}



.navItem{

flex:1;

text-align:center;

font-size:13px;

font-weight:700;

color:#555;

cursor:pointer;

}



.navIcon{

font-size:24px;

margin-bottom:3px;

}



</style>

</head>

<body>
  <!-- الصفحة الرئيسية -->

<div id="home" class="page active">

<div class="topbar">
🚚 Fast Delivery
</div>


<div id="slider" class="slider"></div>


<div id="cats" class="grid"></div>


</div>





<!-- صفحة المتاجر -->

<div id="stores" class="page">


<div class="topbar" onclick="goBack()">

‹ رجوع

</div>



<input

id="storeSearch"

class="searchBox"

placeholder="🔍 ابحث عن متجر..."

onkeyup="searchStores()">



<div id="storesList"></div>


</div>








<!-- صفحة المتجر -->

<div id="storePage" class="page">


<div class="storeHeader">


<div class="backBtn" onclick="goBack()">

‹

</div>


<img id="storeImage" loading="lazy">


</div>



<div id="storeSections" class="sectionScroll"></div>



<input

id="productSearch"

class="searchBox"

placeholder="🔍 ابحث عن منتج..."

onkeyup="searchProducts()">



<div id="storeProducts" class="grid"></div>


</div>








<!-- صفحة تفاصيل المنتج -->

<div id="productPage" class="page">


<div class="topbar" onclick="goBack()">

‹ رجوع

</div>


<div id="productDetails"></div>


</div>








<!-- السلة -->

<div id="cartPage" class="page">


<div class="topbar">

🛒 سلة الطلبات

</div>



<div id="cartItems"></div>



<button

class="sendBtn"

onclick="sendCartWhatsApp()">

إرسال الطلب عبر واتساب

</button>


  </div>
  <!-- القائمة السفلية -->


<div class="bottomNav">


<div class="navItem" onclick="goHome()">

<div class="navIcon">
🏠
</div>

الرئيسية

</div>




<div class="navItem" onclick="openStores()">

<div class="navIcon">
🏪
</div>

المتاجر

</div>





<div class="navItem" onclick="openCart()">

<div class="navIcon">
🛒
</div>

السلة

</div>





<div class="navItem" onclick="openAccount()">

<div class="navIcon">
👤
</div>

الحساب

</div>



</div>





<script>


/* ================= FIREBASE ================= */


const firebaseConfig={

apiKey:"AIzaSyCafh_riwA8AKjkax483Ct4DPbAMkNxCw",

authDomain:"faster-delivery-3efb5.firebaseapp.com",

projectId:"faster-delivery-3efb5",

storageBucket:"faster-delivery-3efb5.appspot.com",

messagingSenderId:"423543107624",

appId:"1:423543107624:web:134eb0c1bc9b59335cc51d"

};



firebase.initializeApp(firebaseConfig);


const db=firebase.firestore();





/* ================= العناصر ================= */


const slider=document.getElementById("slider");

const cats=document.getElementById("cats");

const storesList=document.getElementById("storesList");

const storeImage=document.getElementById("storeImage");

const storeSections=document.getElementById("storeSections");

const storeProducts=document.getElementById("storeProducts");

const productDetails=document.getElementById("productDetails");

const cartItems=document.getElementById("cartItems");





/* ================= المتغيرات ================= */


let historyStack=[];


let cart=

JSON.parse(localStorage.getItem("cart")) || [];



let allStores=[];

let allProducts=[];


let currentProduct=null;


let currentStoreName="";


let currentPrice=0;


let currentOption="";


let quantity=1;


let listeners=[];




function clearListeners(){

listeners.forEach(unsub=>unsub());

listeners=[];

}







/* ================= التنقل ================= */


function show(page){


document.querySelectorAll(".page")

.forEach(p=>p.classList.remove("active"));



document.getElementById(page)

.classList.add("active");



window.scrollTo(0,0);


}





function goHome(){


historyStack=[];

show("home");


}





function goBack(){


let old=historyStack.pop();



if(old){

show(old);

}else{

show("home");

}


}
  /* ================= السلايدر ================= */


let sliderTimer;


let sliderListener =

db.collection("sliders")

.orderBy("createdAt","asc")

.onSnapshot(snapshot=>{


let html="";


snapshot.forEach(doc=>{


let s=doc.data();


html+=`

<img

loading="lazy"

src="${s.img}"

onclick="sliderClick('${s.action}','${s.whatsapp}')"

>

`;

});


slider.innerHTML=html;



let images=document.querySelectorAll("#slider img");


let current=0;


if(sliderTimer){

clearInterval(sliderTimer);

}



if(images.length){


images[0].classList.add("active");



sliderTimer=setInterval(()=>{


images[current].classList.remove("active");


current++;


if(current>=images.length){

current=0;

}


images[current].classList.add("active");


},3000);


}


});


listeners.push(sliderListener);






function sliderClick(type,target){


if(type=="whatsapp"){


window.location.href=

"https://wa.me/"+target;


}


else if(type=="store"){


openStore(target);


}


else if(type=="category"){


openCategory(target);


}


}









/* ================= الأقسام الرئيسية ================= */


let categoriesListener =

db.collection("categories")

.orderBy("createdAt","asc")

.onSnapshot(snapshot=>{


let html="";


snapshot.forEach(doc=>{


let c=doc.data();


html+=`

<div class="card"

onclick="openCategory('${doc.id}')">


<img loading="lazy" src="${c.img}">


<div>

${c.name}

</div>


</div>

`;

});


cats.innerHTML=html;


});


listeners.push(categoriesListener);









/* ================= المتاجر ================= */


function openStores(){


historyStack.push(

document.querySelector(".page.active").id

);



show("stores");



let unsub =

db.collection("stores")

.orderBy("createdAt","asc")

.onSnapshot(snapshot=>{


allStores=[];



snapshot.forEach(doc=>{


let s=doc.data();

s.id=doc.id;


allStores.push(s);


});



renderStores(allStores);


});


listeners.push(unsub);


}







function openCategory(id){


historyStack.push("home");


show("stores");



let unsub =

db.collection("stores")

.where("categoryId","==",id)

.onSnapshot(snapshot=>{


allStores=[];


snapshot.forEach(doc=>{


let s=doc.data();

s.id=doc.id;


allStores.push(s);


});


renderStores(allStores);


});


listeners.push(unsub);


}








function renderStores(list){


let html="";


list.forEach(store=>{


html+=`

<div class="storeCard"

onclick="openStore('${store.id}')">


<img loading="lazy" src="${store.img}">


<div class="storeName">

${store.name}

</div>


</div>

`;

});


storesList.innerHTML=html;


}







function searchStores(){


let text=

document.getElementById("storeSearch")

.value

.toLowerCase();



let result=

allStores.filter(s=>

s.name.toLowerCase().includes(text)

);



renderStores(result);


}







/* ================= فتح المتجر ================= */


function openStore(id){


clearListeners();


historyStack.push("stores");


show("storePage");



db.collection("stores")

.doc(id)

.get()

.then(doc=>{


let store=doc.data();



currentStoreName=store.name;


storeImage.src=store.img;


loadSections(id);


loadProducts(id);


});


}
  /* ================= أقسام المتجر ================= */


function loadSections(storeId){


let unsub =

db.collection("storeSections")

.where("storeId","==",storeId)

.onSnapshot(snapshot=>{


let html=`


<div class="sectionCard"

onclick="loadProducts('${storeId}')">


<img src="https://cdn-icons-png.flaticon.com/512/706/706164.png">


<div>

الكل

</div>


</div>

`;



snapshot.forEach(doc=>{


let s=doc.data();


html+=`

<div class="sectionCard"

onclick="loadSectionProducts('${storeId}','${doc.id}')">


<img src="${s.img}">


<div>

${s.name}

</div>


</div>

`;

});


storeSections.innerHTML=html;


});


listeners.push(unsub);


}







/* ================= المنتجات ================= */


function loadProducts(storeId){


let unsub =

db.collection("products")

.where("storeId","==",storeId)

.onSnapshot(snapshot=>{


allProducts=[];


snapshot.forEach(doc=>{


let p=doc.data();

p.id=doc.id;


allProducts.push(p);


});


renderProducts(allProducts);


});


listeners.push(unsub);


}






function loadSectionProducts(storeId,sectionId){


let unsub =

db.collection("products")

.where("storeId","==",storeId)

.where("sectionId","==",sectionId)

.onSnapshot(snapshot=>{


allProducts=[];


snapshot.forEach(doc=>{


let p=doc.data();

p.id=doc.id;


allProducts.push(p);


});


renderProducts(allProducts);


});


listeners.push(unsub);


}






function renderProducts(list){


let html="";


list.forEach(p=>{


html+=`

<div class="product"

onclick="openProduct('${p.id}')">


<img loading="lazy" src="${p.img}">


<p>

${p.price ? p.price+" TL":""}

</p>


<h3>

${p.name}

</h3>


</div>

`;

});


storeProducts.innerHTML=html;


}






function searchProducts(){


let text=

document.getElementById("productSearch")

.value.toLowerCase();



renderProducts(

allProducts.filter(p=>

p.name.toLowerCase().includes(text)

)

);


}









/* ================= صفحة المنتج ================= */


function openProduct(id){


historyStack.push("storePage");


show("productPage");



db.collection("products")

.doc(id)

.get()

.then(doc=>{


currentProduct=doc.data();


quantity=1;



currentPrice=

Number(currentProduct.price)||0;



productDetails.innerHTML=`

<div class="product"

style="margin:15px;background:#fff;padding:15px;border-radius:15px;">


<img src="${currentProduct.img}"

style="width:100%;height:250px;object-fit:cover;border-radius:15px;">


<h2>

${currentProduct.name}

</h2>


<p>

${currentProduct.description || ""}

</p>


<h2 style="color:#e53935">

${currentPrice} TL

</h2>


<div>

<button onclick="minus()">-</button>

<b id="qty">1</b>

<button onclick="plus()">+</button>

</div>



<button

onclick="addToCart()"

style="margin-top:20px;width:100%;height:50px;background:#e53935;color:#fff;border:0;border-radius:12px;">


إضافة إلى السلة 🛒


</button>


</div>

`;

});


}






function plus(){

quantity++;

document.getElementById("qty").innerHTML=quantity;

}



function minus(){

if(quantity>1){

quantity--;

}

document.getElementById("qty").innerHTML=quantity;

}









/* ================= السلة ================= */


function addToCart(){


cart.push({

name:currentProduct.name,

price:currentPrice,

qty:quantity,

img:currentProduct.img,

store:currentStoreName

});


localStorage.setItem(

"cart",

JSON.stringify(cart)

);


alert("تمت الإضافة للسلة 🛒");


}







function openCart(){


historyStack.push(

document.querySelector(".page.active").id

);


show("cartPage");


displayCart();


}







function displayCart(){


let html="";


let total=0;



cart.forEach((item,index)=>{


total+=item.price*item.qty;



html+=`

<div class="cartItem">


<img src="${item.img}"

style="width:80px;height:80px;border-radius:10px;">


<h3>${item.name}</h3>


<p>

🏪 ${item.store}

</p>


<p>

العدد: ${item.qty}

</p>


<p>

السعر: ${item.price} TL

</p>


<button onclick="removeCart(${index})">

حذف

</button>


</div>

`;

});


html+=`

<div class="cartItem">

<h2>

المجموع: ${total} TL

</h2>

</div>

`;


cartItems.innerHTML=

cart.length ? html : "السلة فارغة 🛒";


}






function removeCart(index){


cart.splice(index,1);


localStorage.setItem(

"cart",

JSON.stringify(cart)

);


displayCart();


}








/* ================= واتساب ================= */


function sendCartWhatsApp(){


if(cart.length==0){

alert("السلة فارغة");

return;

}



let msg="🚚 طلب جديد%0A%0A";


cart.forEach(item=>{


msg+=

"🍔 "+item.name+

"%0A العدد: "+item.qty+

"%0A السعر: "+item.price+

" TL%0A%0A";


});


window.location.href=

"https://wa.me/963985228906?text="+msg;


}






function openAccount(){

alert("صفحة الحساب قريباً");

}






window.onload=function(){

show("home");

};


</script>


</body>

</html
